<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ARSW Multi Server</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: url('moon.jpg') right center / cover no-repeat fixed;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: left;
            padding-left: 8%;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: left;
        }

        .nav {
            display: flex;
            gap: 40px;
            font-size: 0.65em;
            color: rgba(255,255,255,0.35);
            letter-spacing: 3px;
            margin-bottom: 60px;
        }

        .logo { color: white; }

        .sub {
            color: rgba(255,255,255,0.4);
            font-size: 0.75em;
            letter-spacing: 3px;
            margin-bottom: 16px;
        }

        h1 {
            color: white;
            font-size: 3.5em;
            letter-spacing: 4px;
            line-height: 1.3;
            margin-bottom: 30px;
        }

        .quote {
            color: rgba(255,255,255,0.5);
            font-size: 0.85em;
            letter-spacing: 2px;
            line-height: 2.2;
            border-left: 2px solid rgba(255,255,255,0.2);
            padding-left: 20px;
            margin-bottom: 40px;
        }

        .footer {
            font-size: 0.6em;
            color: rgba(255,255,255,0.2);
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
<div class="content">
    <div class="nav">
        <span class="logo">ARSW</span>
        <span>PORT 35003 — RUNNING</span>
        <span>2026-I</span>
    </div>
    <div class="sub">ARQUITECTURA DE SOFTWARE —</div>
    <h1>JAVA WEB<br>SERVER</h1>
    <div class="quote">
        Si fueras una ventana emergente,<br>
        no me importaria que me bloquearas<br>
        la vista todo el dia.
    </div>
    <div class="footer">ESCUELA COLOMBIANA DE INGENIERIA — TALLER CALL & RETURN</div>
</div>
</body>
</html>
